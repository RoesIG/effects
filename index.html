<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Team - Dashboard</title>
    <style>
        /* Estilos generales con vibra Gaming */
        body {
            background-color: #0d0e12;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* Contenedor Principal */
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
            width: 100%;
        }

        /* Estilo para el Logo */
        .team-logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #00ffaa;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.4);
            object-fit: cover;
            margin-bottom: 15px;
        }

        /* Nombre del Equipo */
        .team-name {
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            background: linear-gradient(45deg, #00ffaa, #00bcff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Zona de Redes */
        .creator-profile {
            background: #161920;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #242936;
            margin: 20px auto 40px auto;
            max-width: 400px;
        }

        .creator-title {
            color: #00bcff;
            margin-top: 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Enlaces de Redes */
        .social-links a {
            color: #ffffff;
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .social-links a:hover {
            color: #00ffaa;
        }

        /* ================= SECCIÓN DE LA RULETA ================= */
        .roulette-section {
            background: #161920;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #242936;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .roulette-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px 0;
        }

        /* El marcador/flecha que apunta arriba */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff0055;
            z-index: 10;
            filter: drop-shadow(0 0 5px #ff0055);
        }

        /* El lienzo donde se dibuja la ruleta */
        canvas {
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 238, 255, 0.2);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        /* Controles de Configuración */
        .roulette-config {
            width: 100%;
            max-width: 450px;
            margin-top: 25px;
            border-top: 1px solid #242936;
            padding-top: 20px;
        }

        .input-label {
            display: block;
            font-size: 0.9rem;
            color: #8a8f98;
            margin-bottom: 8px;
            text-align: left;
        }

        .options-input {
            width: 100%;
            background-color: #0d0e12;
            border: 1px solid #242936;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .options-input:focus {
            outline: none;
            border-color: #00bcff;
        }

        /* Botones */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }

        .spin-btn {
            background: linear-gradient(135deg, #ff0055, #9900ff);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .spin-btn:hover { box-shadow: 0 0 25px rgba(255, 0, 85, 0.7); }
        .spin-btn:active { transform: scale(0.95); }

        .update-btn {
            background: #242936;
            color: #00ffaa;
            border: 1px solid #00ffaa;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .update-btn:hover {
            background: rgba(0, 255, 170, 0.1);
        }
        .update-btn:active { transform: scale(0.95); }

        /* Texto del Resultado */
        #result-text {
            margin-top: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #00ffaa;
            height: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 170, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Encabezado del Equipo -->
        <img class="team-logo" src="logo.png" alt="Logo del Equipo" onerror="this.src='https://via.placeholder.com/150/0d0e12/00ffaa?text=LOGO'">
        <h1 class="team-name">Tu Equipo Esports</h1>

        <!-- Tu Perfil -->
        <div class="creator-profile">
            <h3 class="creator-title">Fundador</h3>
            <p style="margin: 0 0 10px 0; font-size: 1.4rem; font-weight: bold; letter-spacing: 0.5px;">Roes</p>
            <div class="social-links">
                <a href="#" target="_blank">🔲 TikTok</a>
                <a href="#" target="_blank">▶️ YouTube</a>
            </div>
        </div>

        <!-- Componente de la Ruleta -->
        <div class="roulette-section">
            <h2>La Ruleta del Equipo</h2>
            <p style="color: #8a8f98; margin-top: 0; margin-bottom: 5px;">¿Qué se juega hoy o qué reto toca?</p>
            
            <div class="roulette-container">
                <div class="pointer"></div>
                <canvas id="wheel" width="300" height="300"></canvas>
            </div>

            <div class="btn-group">
                <button class="spin-btn" id="spin-trigger">Girar</button>
            </div>
            
            <div id="result-text"></div>

            <!-- Panel de configuración dinámica de la ruleta -->
            <div class="roulette-config">
                <label class="input-label" for="options-input">Personalizar opciones (sepáralas con comas):</label>
                <input type="text" id="options-input" class="options-input" value="Valorant, Minecraft, CS2, Reto Extremo, Descanso, Elegir Mapa">
                <button class="update-btn" id="update-trigger">Actualizar Opciones</button>
            </div>
        </div>
    </div>

    <!-- Lógica de la Ruleta Dinámica -->
    <script>
        // Lista base de opciones y paleta de colores para el renderizado
        let options = [];
        const baseColors = ["#1a1d24", "#00ffaa", "#1a1d24", "#00bcff", "#1a1d24", "#ff0055", "#1a1d24", "#9900ff"];
        let wheelColors = [];
        
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spin-trigger");
        const updateBtn = document.getElementById("update-trigger");
        const optionsInput = document.getElementById("options-input");
        const resultText = document.getElementById("result-text");

        const size = canvas.width;
        const center = size / 2;
        let sliceAngle = 0;
        let currentRotation = 0;
        let isSpinning = false;

        // Carga y procesa lo que esté escrito en el cuadro de texto
        function loadOptions() {
            const text = optionsInput.value;
            // Separa el texto por comas, limpia espacios en blanco y quita elementos vacíos
            options = text.split(",").map(opt => opt.trim()).filter(opt => opt.length > 0);
            
            if (options.length < 2) {
                alert("Por favor pon al menos 2 opciones para poder armar la ruleta.");
                return;
            }

            sliceAngle = (2 * Math.PI) / options.length;
            
            // Asignar colores dinámicamente según la cantidad de opciones
            wheelColors = [];
            for (let i = 0; i < options.length; i++) {
                wheelColors.push(baseColors[i % baseColors.length]);
            }
            
            // Reajustar rotación visual a cero sin animar para que se vea limpio el cambio
            canvas.style.transition = "none";
            currentRotation = 0;
            canvas.style.transform = `rotate(0deg)`;
            
            // Forzar un leve retraso para que el navegador asimile el reset antes de redibujar
            setTimeout(() => {
                canvas.style.transition = "transform 4s cubic-bezier(0.1, 0.8, 0.2, 1)";
                drawWheel();
            }, 50);
        }

        // Renderiza los gráficos de los gajos y textos en el lienzo
        function drawWheel() {
            ctx.clearRect(0, 0, size, size);
            
            options.forEach((opt, idx) => {
                const angle = idx * sliceAngle;
                
                ctx.beginPath();
                ctx.fillStyle = wheelColors[idx];
                ctx.moveTo(center, center);
                ctx.arc(center, center, center - 5, angle, angle + sliceAngle);
                ctx.lineTo(center, center);
                ctx.fill();
                
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(angle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = wheelColors[idx] === "#1a1d24" ? "#ffffff" : "#0d0e12";
                
                // Reducir un poco el tamaño de letra si hay demasiadas opciones escritas
                const fontSize = options.length > 10 ? "10px" : "13px";
                ctx.font = `bold ${fontSize} sans-serif`;
                
                // Cortar texto si es ridículamente largo para que no se salga de la ruleta
                const maxTextLength = opt.length > 15 ? opt.substring(0, 13) + "..." : opt;
                ctx.fillText(maxTextLength, center - 20, 4);
                ctx.restore();
            });
        }

        function spin() {
            if (isSpinning || options.length < 2) return;
            isSpinning = true;
            resultText.innerText = "Girando...";

            const extraDegrees = Math.floor(Math.random() * 360);
            const totalSpins = 6 + Math.floor(Math.random() * 4);
            const targetRotation = currentRotation + (totalSpins * 360) + extraDegrees;
            
            canvas.style.transform = `rotate(${targetRotation}deg)`;
            currentRotation = targetRotation;

            setTimeout(() => {
                isSpinning = false;
                // Ajustar el ángulo respecto a la aguja que está clavada arriba (270 grados en el círculo trigonométrico)
                const actualAngle = (360 - (targetRotation % 360) + 270) % 360; 
                const winningIndex = Math.floor(actualAngle / (360 / options.length)) % options.length;
                
                resultText.innerText = `🎉 ¡Cayó: ${options[winningIndex]}!`;
            }, 4000);
        }

        // Eventos iniciales
        loadOptions();
        spinBtn.addEventListener("click", spin);
        updateBtn.addEventListener("click", loadOptions);
    </script>
</body>
</html>
